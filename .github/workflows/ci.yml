name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  AWS_CONFIGURED: ${{ vars.ECS_CLUSTER != '' && vars.ECR_REGISTRY != '' && vars.AWS_ACCOUNT_ID != '' }}

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: |
          for svc in identity-rbac-service patient-service appointment-service emr-service \
                     clinical-service lab-radiology-service pharmacy-service billing-service \
                     analytics-service; do
            echo "Generating Prisma client for $svc..."
            npm run db:generate -w "$svc"
          done

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build shared libs
        run: |
          npm run build -w @hm/contracts
          npm run build -w @hm/logger
          npm run build -w @hm/telemetry
          npm run build -w @hm/messaging

      - name: Build services
        run: |
          for svc in identity-rbac-service api-gateway patient-service appointment-service \
                     emr-service clinical-service lab-radiology-service pharmacy-service \
                     billing-service analytics-service; do
            echo "Building $svc..."
            npm run build -w "$svc"
          done

      - name: Build frontend
        run: npm run build -w frontend

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-test-build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: env.AWS_CONFIGURED == 'true' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.AWS_CONFIGURED == 'true' && github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build all images
        run: |
          if [ "${{ env.AWS_CONFIGURED }}" = "true" ] && [ "${{ github.event_name }}" = "push" ]; then
            node scripts/docker-build-all.mjs \
              --push \
              --registry "${{ vars.ECR_REGISTRY }}" \
              --tag "${{ github.sha }}"
          else
            node scripts/docker-build-all.mjs --tag "${{ github.sha }}"
          fi

  deploy-staging:
    name: Deploy to AWS ECS (Staging)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        if: >-
          env.AWS_CONFIGURED == 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/develop'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy apps and monitoring
        run: |
          if [ "${{ env.AWS_CONFIGURED }}" = "true" ] && \
             [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "Running staging deploy to ECS..."
            node scripts/ecs-deploy.mjs \
              --cluster "${{ vars.ECS_CLUSTER }}" \
              --registry "${{ vars.ECR_REGISTRY }}" \
              --account "${{ vars.AWS_ACCOUNT_ID }}" \
              --tag "${{ github.sha }}" \
              --desired-count 2
          else
            echo "Staging dry-run (validate task defs + rollout plan)..."
            node scripts/ecs-deploy.mjs \
              --dry-run \
              --tag "${{ github.sha }}" \
              --desired-count 2
          fi

  deploy-production:
    name: Deploy to AWS ECS (Production)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        if: >-
          env.AWS_CONFIGURED == 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy apps and monitoring
        run: |
          if [ "${{ env.AWS_CONFIGURED }}" = "true" ] && \
             [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Running production deploy to ECS..."
            node scripts/ecs-deploy.mjs \
              --cluster "${{ vars.ECS_CLUSTER }}" \
              --registry "${{ vars.ECR_REGISTRY }}" \
              --account "${{ vars.AWS_ACCOUNT_ID }}" \
              --tag "${{ github.sha }}" \
              --desired-count 3
          else
            echo "Production dry-run (validate task defs + rollout plan)..."
            node scripts/ecs-deploy.mjs \
              --dry-run \
              --tag "${{ github.sha }}" \
              --desired-count 3
          fi
