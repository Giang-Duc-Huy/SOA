name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}

jobs:
  lint-and-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma clients
        run: |
          SERVICES="identity-rbac-service patient-service appointment-service emr-service clinical-service lab-radiology-service pharmacy-service billing-service analytics-service"
          for svc in $SERVICES; do
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/${svc/_/-}_db npm run db:generate -w $svc || \
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db npm run db:generate -w $svc
          done

      - name: Lint
        run: npm run lint

      - name: Build shared libs
        run: |
          npm run build -w @hm/contracts
          npm run build -w @hm/logger
          npm run build -w @hm/telemetry
          npm run build -w @hm/messaging

      - name: Build all services
        run: |
          for svc in identity-rbac-service api-gateway patient-service appointment-service \
                     emr-service clinical-service lab-radiology-service pharmacy-service \
                     billing-service analytics-service; do
            echo "Building $svc..."
            npm run build -w $svc
          done

      - name: Build frontend
        run: npm run build -w frontend

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-rbac-service
          - api-gateway
          - patient-service
          - appointment-service
          - emr-service
          - clinical-service
          - lab-radiology-service
          - pharmacy-service
          - billing-service
          - analytics-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: env.ECR_REGISTRY != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Login to Amazon ECR
        if: env.ECR_REGISTRY != ''
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service == 'frontend' && 'frontend/Dockerfile' || format('services/{0}/Dockerfile', matrix.service) }}
          push: ${{ env.ECR_REGISTRY != '' }}
          tags: |
            mediflow/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY != '' && format('{0}/mediflow/{1}:latest', env.ECR_REGISTRY, matrix.service) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-staging:
    name: Deploy to AWS ECS (Staging)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push' && vars.ECS_CLUSTER != ''
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Register task definitions
        run: |
          for f in infra/aws/task-definitions/*.json; do
            echo "Registering $f..."
            aws ecs register-task-definition --cli-input-json file://$f
          done

      - name: Update ECS services (rolling deploy)
        run: |
          SERVICES="api-gateway identity-rbac-service patient-service emr-service pharmacy-service billing-service analytics-service"
          for svc in $SERVICES; do
            echo "Updating mediflow-$svc..."
            aws ecs update-service \
              --cluster ${{ vars.ECS_CLUSTER }} \
              --service $svc \
              --force-new-deployment \
              --desired-count 2 || echo "Service $svc not found, skipping"
          done

      - name: Wait for deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services api-gateway || true

  deploy-production:
    name: Deploy to AWS ECS (Production)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ECS_CLUSTER != ''
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Deploy to production ECS
        run: |
          SERVICES="api-gateway identity-rbac-service patient-service emr-service pharmacy-service billing-service analytics-service"
          for svc in $SERVICES; do
            aws ecs update-service \
              --cluster ${{ vars.ECS_CLUSTER }} \
              --service $svc \
              --force-new-deployment \
              --desired-count 3 || echo "Service $svc not found, skipping"
          done
