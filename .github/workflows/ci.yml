name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: |
          for svc in identity-rbac-service patient-service appointment-service emr-service \
                     clinical-service lab-radiology-service pharmacy-service billing-service \
                     analytics-service; do
            echo "Generating Prisma client for $svc..."
            npm run db:generate -w "$svc"
          done

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build shared libs
        run: |
          npm run build -w @hm/contracts
          npm run build -w @hm/logger
          npm run build -w @hm/telemetry
          npm run build -w @hm/messaging

      - name: Build services
        run: |
          for svc in identity-rbac-service api-gateway patient-service appointment-service \
                     emr-service clinical-service lab-radiology-service pharmacy-service \
                     billing-service analytics-service; do
            echo "Building $svc..."
            npm run build -w "$svc"
          done

      - name: Build frontend
        run: npm run build -w frontend

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-test-build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-rbac-service
          - api-gateway
          - patient-service
          - appointment-service
          - emr-service
          - clinical-service
          - lab-radiology-service
          - pharmacy-service
          - billing-service
          - analytics-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: github.event_name == 'push' && vars.ECR_REGISTRY != '' && vars.AWS_ACCOUNT_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && vars.ECR_REGISTRY != '' && vars.AWS_ACCOUNT_ID != ''
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tags
        id: meta
        shell: bash
        run: |
          local_tag="mediflow/${{ matrix.service }}:${{ github.sha }}"
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ vars.ECR_REGISTRY }}" ]; then
            remote_tag="${{ vars.ECR_REGISTRY }}/mediflow/${{ matrix.service }}"
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${remote_tag}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "${remote_tag}:latest" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=$local_tag" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service == 'frontend' && 'frontend/Dockerfile' || format('services/{0}/Dockerfile', matrix.service) }}
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-staging:
    name: Deploy to AWS ECS (Staging)
    runs-on: ubuntu-latest
    needs: docker-build
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/develop' &&
      vars.ECS_CLUSTER != '' &&
      vars.ECR_REGISTRY != '' &&
      vars.AWS_ACCOUNT_ID != ''
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare ECS task definitions
        run: |
          node scripts/prepare-ecs-task-defs.mjs \
            .ecs/task-defs \
            "${{ vars.ECR_REGISTRY }}" \
            "${{ vars.AWS_ACCOUNT_ID }}" \
            "${{ github.sha }}"

      - name: Register task definitions
        run: |
          for f in .ecs/task-defs/*.json; do
            echo "Registering $f..."
            aws ecs register-task-definition --cli-input-json "file://$f"
          done

      - name: Update ECS services (rolling deploy)
        run: |
          for svc in api-gateway identity-rbac-service patient-service emr-service pharmacy-service billing-service analytics-service; do
            task_family="mediflow-${svc}"
            echo "Updating $svc with task family $task_family..."
            aws ecs update-service \
              --cluster "${{ vars.ECS_CLUSTER }}" \
              --service "$svc" \
              --task-definition "$task_family" \
              --force-new-deployment \
              --desired-count 2 || echo "Service $svc not found, skipping"
          done

      - name: Wait for deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services api-gateway || echo "api-gateway stability wait skipped"

  deploy-production:
    name: Deploy to AWS ECS (Production)
    runs-on: ubuntu-latest
    needs: docker-build
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ECS_CLUSTER != '' &&
      vars.ECR_REGISTRY != '' &&
      vars.AWS_ACCOUNT_ID != ''
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare ECS task definitions
        run: |
          node scripts/prepare-ecs-task-defs.mjs \
            .ecs/task-defs \
            "${{ vars.ECR_REGISTRY }}" \
            "${{ vars.AWS_ACCOUNT_ID }}" \
            "${{ github.sha }}"

      - name: Register task definitions
        run: |
          for f in .ecs/task-defs/*.json; do
            echo "Registering $f..."
            aws ecs register-task-definition --cli-input-json "file://$f"
          done

      - name: Update ECS services (rolling deploy)
        run: |
          for svc in api-gateway identity-rbac-service patient-service emr-service pharmacy-service billing-service analytics-service; do
            task_family="mediflow-${svc}"
            echo "Updating $svc with task family $task_family..."
            aws ecs update-service \
              --cluster "${{ vars.ECS_CLUSTER }}" \
              --service "$svc" \
              --task-definition "$task_family" \
              --force-new-deployment \
              --desired-count 3 || echo "Service $svc not found, skipping"
          done

      - name: Wait for deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services api-gateway || echo "api-gateway stability wait skipped"
