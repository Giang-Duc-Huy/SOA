global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["localhost:3000"]
    metrics_path: /metrics

  - job_name: "identity-rbac-service"
    static_configs:
      - targets: ["localhost:3001"]
    metrics_path: /metrics

  - job_name: "local-services"
    static_configs:
      - targets:
          - "localhost:3002"
          - "localhost:3003"
          - "localhost:3004"
          - "localhost:3005"
          - "localhost:3006"
          - "localhost:3007"
          - "localhost:3008"
          - "localhost:3009"
    metrics_path: /metrics
